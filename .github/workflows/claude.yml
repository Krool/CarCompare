name: Claude Code

# Comment "@claude ..." on an issue or PR to start a mission. Claude follows this repo's
# CLAUDE.md.
#
# PREREQUISITES (one-time, repo owner). This workflow is dormant until both are done:
#   1. Install the Claude GitHub App on this repo: https://github.com/apps/claude
#      (or run `/install-github-app` from the Claude Code CLI).
#   2. Add repo secret CLAUDE_CODE_OAUTH_TOKEN (Settings > Secrets and variables > Actions),
#      generated by running `claude setup-token` in the Claude Code CLI. This authenticates via
#      your Claude Pro/Max subscription (draws on the subscription quota) instead of pay-as-you-go
#      API billing. To meter against an API key instead, swap this line for
#      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}.
#   Until the secret exists, an @claude mention starts this job and fails with an auth error.
#
# Cost guard: claude_args pins the model (Sonnet, the default execution tier) and caps turns.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 15 --model claude-sonnet-4-6"