name: PR Checks

# Verification signal for pull requests. Does not deploy; deploy.yml owns GitHub Pages.
#
# Blocking gate:     typecheck + build (both currently green).
# Non-blocking:      lint. The repo is not eslint-clean yet (pre-existing debt tracked in
#                    issue #3). Lint runs for visibility but does not fail the PR until that
#                    debt is paid down and the step is made blocking.

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (non-blocking, see issue #3)
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
